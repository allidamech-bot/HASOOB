name: hasoob_app
description: "نظام حاسوب المطور لإدارة التجارة والمخزون"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cloud_firestore: ^5.6.11
  firebase_auth: ^5.7.0
  firebase_analytics: ^11.3.6
  firebase_core: ^3.15.1

  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3

  connectivity_plus: ^6.0.3
  path: ^1.8.3
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  share_plus: ^10.0.2
  intl: ^0.20.2
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.12.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - lib/l10n/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#0B1020"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B1020"
  image: assets/images/logo.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
