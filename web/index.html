<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  
  <!-- Cache Control for stale assets fix -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="hasoob_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>hasoob_app</title>
  <link rel="manifest" href="manifest.json">
  <style id="splash-screen-style">
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #070B14;
    }

    #splash-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 50%, #0F172A 0%, #070B14 100%);
      z-index: 20000;
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    /* Luxury decorative elements */
    .glow-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 150vmax;
      height: 150vmax;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
      pointer-events: none;
      animation: pulsate 8s ease-in-out infinite;
    }

    .accent-line {
      position: absolute;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.15), transparent);
      bottom: 20%;
    }

    .business-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.3;
      pointer-events: none;
    }

    .logo-box {
      position: relative;
      z-index: 20001;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: splashEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    #splash-logo {
      width: clamp(120px, 15vw, 180px);
      height: auto;
      margin-bottom: 40px;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5));
    }

    /* Premium Gold Loader */
    .premium-loader {
      width: 40px;
      height: 40px;
      position: relative;
    }

    .premium-loader::before,
    .premium-loader::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #D4AF37;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .premium-loader::after {
      border-top-color: #22D3EE;
      animation-delay: -0.4s;
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulsate {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes splashEntry {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    #diagnostics {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(7, 11, 20, 0.9);
      color: #22D3EE;
      font-family: 'Inter', monospace;
      font-size: 11px;
      z-index: 20010;
      pointer-events: none;
      padding: 12px;
      border-radius: 8px;
      max-width: 90%;
      border: 1px solid rgba(148, 163, 184, 0.1);
    }
  </style>
  <script id="splash-screen-script">
    function isStartupDebugEnabled() {
      try {
        var params = new URLSearchParams(window.location.search);
        if (params.get('debugStartup') === '1' || params.get('debugStartup') === 'true') {
          return true;
        }
        return window.localStorage && window.localStorage.getItem('HASOOB_DEBUG_STARTUP') === 'true';
      } catch (_) {
        return false;
      }
    }

    function logDiagnostic(msg) {
      console.log("[Diagnostic] " + msg);
      if (!isStartupDebugEnabled()) {
        return;
      }
      var diag = document.getElementById('diagnostics');
      if (!diag) {
        diag = document.createElement('div');
        diag.id = 'diagnostics';
        diag.setAttribute('aria-hidden', 'true');
        document.body.appendChild(diag);
      }
      diag.style.display = 'block';
      var line = document.createElement('div');
      line.textContent = new Date().toISOString().substr(14, 5) + ": " + msg;
      diag.appendChild(line);
      diag.scrollTop = diag.scrollHeight;
    }

    function notifyFlutterLifecycle(eventName) {
      try {
        console.log("[Lifecycle] " + eventName);
        if (typeof window.HASOOB_FLUTTER_SYNC_HOOK === 'function') {
          window.HASOOB_FLUTTER_SYNC_HOOK(eventName);
        }
      } catch (e) {
        console.warn("[Lifecycle] hook failed", e);
      }
    }

    document.addEventListener('visibilitychange', function() {
      notifyFlutterLifecycle(document.visibilityState === 'visible' ? 'visible' : 'hidden');
    });
    window.addEventListener('focus', function() { notifyFlutterLifecycle('focus'); });
    window.addEventListener('blur', function() { notifyFlutterLifecycle('blur'); });
    window.addEventListener('pagehide', function() { notifyFlutterLifecycle('pagehide'); });
    window.addEventListener('pageshow', function() { notifyFlutterLifecycle('pageshow'); });
    window.addEventListener('online', function() { notifyFlutterLifecycle('online'); });
    window.addEventListener('offline', function() { notifyFlutterLifecycle('offline'); });

    window.onerror = function(message, source, lineno, colno, error) {
      logDiagnostic("ERR: " + message + " @ " + lineno);
      return false;
    };

    window.onunhandledrejection = function(event) {
      logDiagnostic("REJ: " + event.reason);
    };

    function removeSplashFromWeb() {
      logDiagnostic("removeSplashFromWeb called");
      const splash = document.getElementById("splash-container");
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => {
          splash.remove();
          logDiagnostic("Splash removed");
        }, 600);
      }
      document.body.style.background = "transparent";
    }

    logDiagnostic("index loaded");
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport">
</head>
<body>
  <div id="splash-container">
    <div class="business-pattern"></div>
    <div class="glow-overlay"></div>
    <div class="accent-line"></div>
    
    <div class="logo-box">
      <img id="splash-logo" src="splash/img/dark-1x.png" alt="HASOOB Logo">
      <div class="premium-loader"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Cache bust flutter_bootstrap.js
    (function() {
      var script = document.createElement("script");
      script.src = "flutter_bootstrap.js?v=" + new Date().getTime();
      script.defer = true;
      document.body.appendChild(script);
    })();
  </script>


</body></html>
